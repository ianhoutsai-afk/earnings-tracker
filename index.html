<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&P 500 財報追蹤 | 專業版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .history-panel { max-height: 0; opacity: 0; transition: max-height 0.3s ease-out, opacity 0.2s ease-in; overflow: hidden; }
        .history-panel.open { max-height: 1000px; opacity: 1; }
        .rotate-180 { transform: rotate(180deg); transition: transform 0.3s ease; }
        .rotate-0 { transform: rotate(0deg); transition: transform 0.3s ease; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-6xl mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-black tracking-tighter text-slate-900">S&P 500 財報追蹤</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Institutional Grade Earnings Monitor</p>
        </header>

        <!-- 搜尋與篩選工具欄 -->
        <div class="flex flex-col md:flex-row gap-4 mb-6 justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input" oninput="onSearchInput()" placeholder="搜尋 Ticker 或 公司名稱..." class="block w-full pl-10 pr-3 py-2 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <select id="sector-filter" onchange="filterData()" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold text-slate-600 outline-none focus:ring-2 focus:ring-indigo-500 truncate max-w-[150px] md:max-w-xs">
                    <option value="all">所有產業</option>
                </select>
                <button onclick="expandAll()" class="px-3 py-2 bg-white border border-slate-200 text-slate-600 rounded-xl text-[11px] font-bold hover:bg-indigo-50 transition-all whitespace-nowrap shadow-sm">展開前30家</button>
                <button onclick="collapseAll()" class="px-3 py-2 bg-white border border-slate-200 text-slate-600 rounded-xl text-[11px] font-bold hover:bg-rose-50 transition-all whitespace-nowrap shadow-sm">全部折疊</button>
            </div>
        </div>

        <!-- 狀態欄 -->
        <div class="mb-2 px-2 flex justify-between items-center text-xs font-bold text-slate-400">
            <span id="display-count">載入中...</span>
            <span id="sort-indicator" class="text-indigo-500">排序：倒數天數 ▴</span>
        </div>

        <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
            <!-- 表格頭部：增加排序點擊 -->
            <div class="hidden md:grid grid-cols-6 bg-slate-900 text-white p-4 text-xs font-bold uppercase tracking-wider cursor-pointer">
                <div class="col-span-1">公司 / Ticker</div>
                <div class="col-span-1 text-center hover:text-indigo-300 transition-colors" onclick="setSort('sector')">產業 ⇅</div>
                <div class="col-span-1 text-center hover:text-indigo-300 transition-colors" onclick="setSort('date')">發布日 ⇅</div>
                <div class="col-span-1 text-center hover:text-indigo-300 transition-colors" onclick="setSort('days_left')">倒數 ⇅</div>
                <div class="col-span-1 text-center">狀態</div>
                <div class="col-span-1 text-right">操作</div>
            </div>

            <div id="list" class="divide-y divide-slate-100">
                <div class="p-10 text-center text-slate-400 text-sm">
                    <div class="loader mb-3"></div>
                    正在拉取 S&P 500 數據，請稍候...
                </div>
            </div>
        </div>

        <!-- 分頁控制 -->
        <div class="flex justify-center items-center gap-4 mt-6">
            <button id="prev-page" onclick="changePage(-1)" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-50 transition-all">上一頁</button>
            <span id="page-info" class="text-xs font-bold text-slate-500">Page 1 / 1</span>
            <button id="next-page" onclick="changePage(1)" class="px-4 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-50 disabled:opacity-50 transition-all">下一頁</button>
        </div>

        <footer class="mt-8 text-center">
            <div class="flex items-center justify-center gap-2">
                <p id="update-time" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"></p>
                <span id="update-status" class="px-2 py-0.5 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-full text-[9px] font-black uppercase tracking-tighter">
                    🔄 每日自動更新
                </span>
            </div>
        </footer>
    </div>

    <script>
        let ALL_DATA = [];
        let FILTERED_DATA = [];
        let currentPage = 1;
        let pageSize = 50;
        let currentSort = { field: 'days_left', direction: 'asc' };
        let searchTimeout = null;

        function formatLocalTime(utcString) {
            const date = new Date(utcString);
            return date.toLocaleString(undefined, { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
            });
        }

        function checkUpdateHealth(lastUpdatedStr) {
            const statusBadge = document.getElementById('update-status');
            try {
                const lastDate = new Date(lastUpdatedStr);
                const now = new Date();
                const diffHours = Math.floor((now - lastDate) / 3600000);
                if (diffHours > 26) { 
                    statusBadge.innerText = "⚠️ 更新延遲中";
                    statusBadge.classList.replace('bg-indigo-50', 'bg-rose-50');
                    statusBadge.classList.replace('text-indigo-600', 'text-rose-600');
                }
            } catch (e) {}
        }

        function onSearchInput() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                filterData();
            }, 300);
        }

        function setSort(field) {
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.direction = 'asc';
            }
            
            const indicators = { 'days_left': '倒數天數', 'date': '發布日期', 'sector': '產業類別' };
            document.getElementById('sort-indicator').innerText = `排序：${indicators[field]} ${currentSort.direction === 'asc' ? '▴' : '▾'}`;
            
            filterData();
        }

        function renderList(data) {
            const listElement = document.getElementById('list');
            document.getElementById('display-count').innerText = `目前顯示 ${data.length} 家公司`;

            if (data.length === 0) {
                listElement.innerHTML = '<div class="p-10 text-center text-slate-400">找不到匹配的公司...</div>';
                return;
            }

            // 執行排序
            const sortedData = [...data].sort((a, b) => {
                let valA = a[currentSort.field];
                let valB = b[currentSort.field];
                if (typeof valA === 'string') {
                    return currentSort.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
                return currentSort.direction === 'asc' ? (valA - valB) : (valB - valA);
            });

            // 分頁切片
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = sortedData.slice(start, end);

            listElement.innerHTML = pageData.map((c, index) => {
                let colorClass = "text-slate-800", bgClass = "bg-slate-100", countNumber = "--";
                let statusLabel = "待定", badgeColor = "bg-slate-100 text-slate-600";
                
                if (typeof c.days_left === 'number') {
                    countNumber = c.days_left;
                    if (c.days_left === 0) { 
                        statusLabel = "今日發布"; badgeColor = "bg-rose-500 text-white"; 
                    } else if (c.days_left <= 7) { 
                        statusLabel = "緊急"; badgeColor = "bg-rose-100 text-rose-700"; 
                    } else if (c.days_left <= 14) { 
                        statusLabel = "接近"; badgeColor = "bg-amber-100 text-amber-700"; 
                    } else { 
                        statusLabel = "正常"; badgeColor = "bg-indigo-100 text-indigo-700"; 
                    }
                }

                return `
                <div class="flex flex-col">
                    <div class="grid grid-cols-1 md:grid-cols-6 p-4 md:p-3 items-center hover:bg-slate-50 transition-colors ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'}">
                        <div class="col-span-1 flex items-center gap-3">
                            <span class="text-lg font-black tracking-tighter w-14">${c.ticker}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase hidden sm:inline truncate w-24" title="${c.name}">${c.name}</span>
                        </div>
                        <div class="col-span-1 text-center text-[10px] font-bold text-slate-500 truncate" title="${c.sector}">${c.sector}</div>
                        <div class="col-span-1 text-center font-bold text-slate-700 text-sm mt-2 md:mt-0">
                            ${c.date} ${c.timing !== 'Unknown' ? `<span class="text-[9px] text-indigo-500 ml-1">${c.timing}</span>` : ''}
                        </div>
                        <div class="col-span-1 text-center mt-2 md:mt-0">
                            <span class="${badgeColor} px-3 py-1 rounded-full text-xs font-black">${countNumber} 天</span>
                        </div>
                        <div class="col-span-1 text-center mt-1 md:mt-0">
                            <span class="text-[10px] font-bold text-slate-500">${statusLabel}</span>
                        </div>
                        <div class="col-span-1 text-right mt-3 md:mt-0">
                            <button id="button-${c.ticker}" onclick="toggleHistory('${c.ticker}')" class="btn-toggle px-3 py-1.5 bg-slate-100 text-slate-500 rounded-lg text-[10px] font-bold hover:bg-slate-200 transition-all shadow-sm">
                                歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div id="history-${c.ticker}" class="history-panel bg-slate-100/50 border-t border-b border-slate-200"></div>
                </div>`;
            }).join('');

            // 更新分頁資訊
            const totalPages = Math.ceil(data.length / pageSize);
            document.getElementById('page-info').innerText = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('prev-page').disabled = (currentPage === 1);
            document.getElementById('next-page').disabled = (currentPage === totalPages);
        }

        function changePage(dir) {
            currentPage += dir;
            renderList(FILTERED_DATA);
        }

        function renderHistoryContent(ticker) {
            const panel = document.getElementById('history-' + ticker);
            if (!panel || panel.innerHTML.trim() !== '') return;

            const company = ALL_DATA.find(c => c.ticker === ticker);
            if (!company) return;

            let historyHtml = '<p class="text-xs text-slate-400 p-6 text-center">暫無歷史財報數據</p>';
            if (company.history && company.history.length > 0) {
                historyHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-4">
                    ${company.history.map(h => `
                        <div class="flex items-center justify-between p-3 bg-white border border-slate-100 rounded-lg shadow-sm">
                            <div>
                                <p class="text-xs font-bold text-slate-700">${h.type}</p>
                                <p class="text-[10px] text-slate-400 mt-0.5">發布於 ${h.date}</p>
                            </div>
                            <div class="flex gap-1">
                                <a href="${h.html_url}" target="_blank" class="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[9px] font-bold hover:bg-slate-200 transition-colors">📱 手機</a>
                                <a href="${h.ix_url}" target="_blank" class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-[9px] font-bold hover:bg-indigo-100 transition-colors">💻 電腦</a>
                            </div>
                        </div>`).join('')}
                </div>`;
            }
            panel.innerHTML = historyHtml;
        }

        function toggleHistory(ticker) {
            const panel = document.getElementById('history-' + ticker);
            const btn = document.getElementById('button-' + ticker);
            const arrow = btn.querySelector('svg');
            const isOpen = panel.classList.toggle('open');
            if (isOpen) {
                renderHistoryContent(ticker);
                btn.innerHTML = '收起歷史財報 ▴';
                btn.classList.replace('bg-slate-100', 'bg-indigo-100');
                btn.classList.replace('text-slate-500', 'text-indigo-600');
                arrow.classList.replace('rotate-0', 'rotate-180');
            } else {
                btn.innerHTML = '歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>';
                btn.classList.replace('bg-indigo-100', 'bg-slate-100');
                btn.classList.replace('text-indigo-600', 'text-slate-500');
                arrow.classList.replace('rotate-180', 'rotate-0');
            }
        }

        function filterData() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const sector = document.getElementById('sector-filter').value;
            FILTERED_DATA = ALL_DATA.filter(c => {
                const matchesSearch = c.ticker.toLowerCase().includes(search) || c.name.toLowerCase().includes(search);
                const matchesSector = sector === 'all' || c.sector === sector;
                return matchesSearch && matchesSector;
            });
            currentPage = 1; // 搜尋後回到第一頁
            renderList(FILTERED_DATA);
        }

        function expandAll() {
            const panels = document.querySelectorAll('.history-panel');
            const limit = 30;
            let count = 0;
            panels.forEach(panel => {
                if (count < limit && !panel.classList.contains('open')) {
                    const ticker = panel.id.replace('history-', '');
                    panel.classList.add('open');
                    renderHistoryContent(ticker);
                    const btn = document.getElementById('button-' + ticker);
                    if (btn) {
                        btn.innerHTML = '收起歷史財報 ▴';
                        btn.classList.replace('bg-slate-100', 'bg-indigo-100');
                        btn.classList.replace('text-slate-500', 'text-indigo-600');
                        const arrow = btn.querySelector('svg');
                        if (arrow) arrow.classList.replace('rotate-0', 'rotate-180');
                    }
                    count++;
                }
            });
            if (panels.length > limit) alert(`為了效能，僅展開前 ${limit} 家公司。`);
        }

        function collapseAll() {
            document.querySelectorAll('.history-panel').forEach(p => p.classList.remove('open'));
            document.querySelectorAll('.btn-toggle').forEach(b => {
                b.innerHTML = '歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>';
                b.classList.replace('bg-indigo-100', 'bg-slate-100');
                b.classList.replace('text-indigo-600', 'text-slate-500');
            });
        }

        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + new Date().getTime());
                const data = await res.json();
                ALL_DATA = data.companies;
                FILTERED_DATA = [...ALL_DATA];
                document.getElementById('update-time').innerText = "Last Updated: " + formatLocalTime(data.last_updated);
                checkUpdateHealth(data.last_updated);

                const sectors = [...new Set(ALL_DATA.map(c => c.sector))].sort();
                const sectorSelect = document.getElementById('sector-filter');
                sectorSelect.innerHTML = '<option value="all">所有產業</option>';
                sectors.forEach(s => {
                    if(s && s !== 'Unknown') {
                        const opt = document.createElement('option');
                        opt.value = s; opt.innerText = s;
                        sectorSelect.appendChild(opt);
                    }
                });

                filterData();
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-rose-500 font-bold">無法載入數據...</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
