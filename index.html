<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財報追蹤網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
<script>
    // 修改後的「手風琴」展開邏輯
    function toggleHistory(ticker) {
        const targetEl = document.getElementById('history-' + ticker);
        const targetButton = document.getElementById('button-' + ticker);
        const targetArrow = targetButton.querySelector('svg');
        
        // 1. 記錄目標目前是否已經是開啟狀態 (為了實現點擊同一個按鈕可以關閉)
        const isAlreadyOpen = !targetEl.classList.contains('hidden');

        // 2. 強制關閉所有已展開的歷史區塊
        document.querySelectorAll('[id^="history-"]').forEach(el => {
            el.classList.add('hidden');
        });

        // 3. 重置所有按鈕的箭頭方向
        document.querySelectorAll('[id^="button-"] svg').forEach(svg => {
            svg.style.transform = 'rotate(0deg)';
        });

        // 4. 如果目標原本是關閉的，則將其開啟
        if (!isAlreadyOpen) {
            targetEl.classList.remove('hidden');
            targetArrow.style.transform = 'rotate(180deg)';
        }
    }
</script>
</head>
<body class="bg-slate-100 font-sans transition-all">
    <!-- 容器：手機端 max-w-md, 電腦端 max-w-7xl -->
    <div class="max-w-md mx-auto md:max-w-7xl px-0 md:px-6 min-h-screen bg-transparent">
        
        <!-- 頂部標題：電腦端更寬、更像導航欄 -->
        <header class="bg-indigo-700 p-6 md:p-8 text-white text-center shadow-lg md:rounded-b-3xl mb-6">
            <h1 class="text-2xl md:text-3xl font-black tracking-widest">財報追蹤網站</h1>
            <p class="text-indigo-200 text-[10px] md:text-xs font-bold uppercase tracking-widest mt-2 opacity-80">
                Magnificent Seven Earnings Tracker
            </p>
        </header>

        <!-- 核心內容：手機端 1 列, 電腦端 2-3 列 -->
        <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6">
            <div class="col-span-full p-10 text-center text-slate-400 text-sm">數據加載中...</div>
        </div>

        <footer class="p-8 text-center">
            <p id="update-time" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"></p>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + new Date().getTime());
                const data = await res.json();
                document.getElementById('update-time').innerText = "Last Updated: " + data.last_updated;

                const html = data.companies.map(c => {
                    let colorClass = "text-slate-800", bgClass = "bg-slate-100", countNumber = "--";
                    if (typeof c.days_left === 'number') {
                        countNumber = c.days_left;
                        if (c.days_left === 0) { colorClass = "text-white"; bgClass = "bg-rose-500 animate-pulse"; }
                        else if (c.days_left <= 7) { colorClass = "text-rose-700"; bgClass = "bg-rose-50"; }
                        else if (c.days_left <= 14) { colorClass = "text-amber-700"; bgClass = "bg-amber-50"; }
                        else { colorClass = "text-indigo-700"; bgClass = "bg-indigo-50"; }
                    }

                    let historyHtml = '<p class="text-xs text-slate-400 p-4">暫無歷史財報數據</p>';
                    if (c.history && c.history.length > 0) {
                        historyHtml = c.history.map(h => `
                            <div class="py-3 flex items-center justify-between border-b border-slate-50 last:border-0">
                                <div>
                                    <p class="text-xs font-bold text-slate-700">${h.type}</p>
                                    <p class="text-[10px] text-slate-400 mt-0.5">發布於 ${h.date}</p>
                                </div>
                                <div class="flex gap-2">
                                    <a href="${h.html_url}" target="_blank" class="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[9px] font-bold hover:bg-slate-200 transition-colors">
                                        📱 手機版
                                    </a>
                                    <a href="${h.ix_url}" target="_blank" class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-[9px] font-bold hover:bg-indigo-100 transition-colors">
                                        💻 電腦版
                                    </a>
                                </div>
                            </div>
                        `).join('');
                    }

                    return `
                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col transition-all hover:shadow-md">
                        <!-- 上半部：主資訊 -->
                        <div class="p-6 flex justify-between items-center">
                            <div>
                                <span class="text-2xl font-black tracking-tighter text-slate-800">${c.ticker}</span>
                                <p class="text-[11px] font-bold text-slate-400 uppercase">${c.name}</p>
                                <div class="mt-4">
                                    <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Expected Date</p>
                                    <p class="text-sm font-bold text-slate-800">${c.date}</p>
                                </div>
                            </div>
                            <div class="text-center">
                                <div class="${bgClass} ${colorClass} rounded-2xl px-4 py-3 min-w-[90px] shadow-sm border border-white/50">
                                    <p class="text-[10px] font-black mb-1 opacity-80 uppercase leading-none">${c.days_left === 0 ? 'Today' : 'Days'}</p>
                                    <p class="text-3xl font-black leading-none">${countNumber}</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 操作區 -->
                        <div class="px-6 pb-6">
                            <button id="button-${c.ticker}" onclick="toggleHistory('${c.ticker}')" class="w-full py-2 bg-slate-50 text-slate-500 rounded-xl text-xs font-bold hover:bg-slate-100 transition-colors flex justify-center items-center gap-1 border border-slate-100">
                                歷史財報查詢 (SEC)
                                <svg class="w-3 h-3 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                        </div>

                        <!-- 歷史財報區塊 -->
                        <div id="history-${c.ticker}" class="hidden px-6 pb-6 bg-slate-50/50">
                            <div class="border border-slate-200 rounded-xl p-4 bg-white shadow-inner">
                                ${historyHtml}
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
                document.getElementById('list').innerHTML = html;
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="col-span-full p-10 text-center text-slate-400">無法載入數據，請檢查更新狀態。</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
