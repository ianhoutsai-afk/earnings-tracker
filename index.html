<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財報追蹤網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .history-panel {
            max-height: 0;
            opacity: 0;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-in-out;
            overflow: hidden;
        }
        .history-panel.open {
            max-height: 1000px;
            opacity: 1;
        }
        .rotate-180 { transform: rotate(180deg); transition: transform 0.3s ease; }
        .rotate-0 { transform: rotate(0deg); transition: transform 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-black tracking-tighter text-slate-900">財報追蹤網站</h1>
            <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-2">Magnificent Seven Earnings Monitor</p>
        </header>

        <!-- 操作工具欄：一鍵控制 -->
        <div class="flex justify-end gap-3 mb-4">
            <button onclick="expandAll()" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 rounded-lg text-[11px] font-bold hover:bg-indigo-50 hover:text-indigo-600 transition-all shadow-sm">
                全部展開 ▽
            </button>
            <button onclick="collapseAll()" class="px-3 py-1.5 bg-white border border-slate-200 text-slate-600 rounded-lg text-[11px] font-bold hover:bg-rose-50 hover:text-rose-600 transition-all shadow-sm">
                全部折疊 △
            </button>
        </div>

        <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
            <!-- 表格頭部 -->
            <div class="hidden md:grid grid-cols-5 bg-slate-900 text-white p-4 text-xs font-bold uppercase tracking-wider">
                <div class="col-span-1">公司 / Ticker</div>
                <div class="col-span-1 text-center">預計發布日</div>
                <div class="col-span-1 text-center">倒數天數</div>
                <div class="col-span-1 text-center">狀態</div>
                <div class="col-span-1 text-right">操作</div>
            </div>

            <!-- 數據行 -->
            <div id="list" class="divide-y divide-slate-100">
                <div class="p-10 text-center text-slate-400 text-sm">正在同步數據...</div>
            </div>
        </div>

        <!-- 修改後的 Footer：增加更新週期提示 -->
        <footer class="mt-8 text-center">
            <div class="flex items-center justify-center gap-2">
                <p id="update-time" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"></p>
                <span id="update-status" class="px-2 py-0.5 bg-indigo-50 text-indigo-600 border border-indigo-100 rounded-full text-[9px] font-black uppercase tracking-tighter transition-all">
                    🔄 每小時自動更新
                </span>
            </div>
        </footer>
    </div>

    <script>
        // 1. 單獨切換某個卡片
        function toggleHistory(ticker) {
            const targetPanel = document.getElementById('history-' + ticker);
            const targetButton = document.getElementById('button-' + ticker);
            const targetArrow = targetButton.querySelector('svg');
            
            const isOpen = targetPanel.classList.toggle('open');
            
            if (isOpen) {
                targetButton.innerHTML = '收起歷史財報 ▴';
                targetButton.classList.replace('bg-slate-100', 'bg-indigo-100');
                targetButton.classList.replace('text-slate-500', 'text-indigo-600');
                targetArrow.classList.replace('rotate-0', 'rotate-180');
            } else {
                targetButton.innerHTML = '歷史財報查詢 ▾';
                targetButton.classList.replace('bg-indigo-100', 'bg-slate-100');
                targetButton.classList.replace('text-indigo-600', 'text-slate-500');
                targetArrow.classList.replace('rotate-180', 'rotate-0');
            }
        }

        // 2. 一鍵全部展開
        function expandAll() {
            document.querySelectorAll('.history-panel').forEach(panel => {
                panel.classList.add('open');
            });
            document.querySelectorAll('.btn-toggle').forEach(btn => {
                btn.innerHTML = '收起歷史財報 ▴';
                btn.classList.replace('bg-slate-100', 'bg-indigo-100');
                btn.classList.replace('text-slate-500', 'text-indigo-600');
                const arrow = btn.querySelector('svg');
                if (arrow) arrow.classList.replace('rotate-0', 'rotate-180');
            });
        }

        // 3. 一鍵全部折疊
        function collapseAll() {
            document.querySelectorAll('.history-panel').forEach(panel => {
                panel.classList.remove('open');
            });
            document.querySelectorAll('.btn-toggle').forEach(btn => {
                btn.innerHTML = '歷史財報查詢 ▾';
                btn.classList.replace('bg-indigo-100', 'bg-slate-100');
                btn.classList.replace('text-indigo-600', 'text-slate-500');
                const arrow = btn.querySelector('svg');
                if (arrow) arrow.classList.replace('rotate-180', 'rotate-0');
            });
        }

        // 新增：檢查更新狀態的函數
        function checkUpdateHealth(lastUpdatedStr) {
            const statusBadge = document.getElementById('update-status');
            try {
                // 處理日期格式，將 2023-10-27 14:00:00 轉為 JS 可讀格式
                const lastDate = new Date(lastUpdatedStr.replace(/-/g, '/'));
                const now = new Date();
                const diffMinutes = Math.floor((now - lastDate) / 60000);

                if (diffMinutes > 70) { // 如果超過 70 分鐘未更新
                    statusBadge.innerText = "⚠️ 更新延遲中";
                    statusBadge.classList.replace('bg-indigo-50', 'bg-rose-50');
                    statusBadge.classList.replace('text-indigo-600', 'text-rose-600');
                    statusBadge.classList.replace('border-indigo-100', 'border-rose-100');
                }
            } catch (e) {
                console.error("時間解析錯誤:", e);
            }
        }

        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + new Date().getTime());
                const data = await res.json();
                
                const utcDate = new Date(data.last_updated); 
                // toLocaleString() 会根据用户的浏览器语言和时区自动转换
                const localTime = utcDate.toLocaleString(undefined, { 
                    year: 'numeric', 
                    month: '2-digit', 
                    day: '2-digit', 
                    hour: '2-digit', 
                    minute: '2-digit', 
                    second: '2-digit',
                    hour12: false 
                });
                document.getElementById('update-time').innerText = "Last Updated: " + localTime;
                
                // 檢查更新健康狀態
                checkUpdateHealth(data.last_updated);

                const html = data.companies.map((c, index) => {
                    let colorClass = "text-slate-800", bgClass = "bg-slate-100", countNumber = "--";
                    let statusLabel = "待定";
                    
                    if (typeof c.days_left === 'number') {
                        countNumber = c.days_left;
                        if (c.days_left === 0) { colorClass = "text-white"; bgClass = "bg-rose-500"; statusLabel = "今日發布"; }
                        else if (c.days_left <= 7) { colorClass = "text-rose-700"; bgClass = "bg-rose-50"; statusLabel = "緊急"; }
                        else if (c.days_left <= 14) { colorClass = "text-amber-700"; bgClass = "bg-amber-50"; statusLabel = "接近"; }
                        else { colorClass = "text-indigo-700"; bgClass = "bg-indigo-50"; statusLabel = "正常"; }
                    }

                    let historyHtml = '<p class="text-xs text-slate-400 p-6 text-center">暫無歷史財報數據</p>';
                    if (c.history && c.history.length > 0) {
                        historyHtml = `
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-4">
                                ${c.history.map(h => `
                                    <div class="flex items-center justify-between p-3 bg-white border border-slate-100 rounded-lg shadow-sm">
                                        <div>
                                            <p class="text-xs font-bold text-slate-700">${h.type}</p>
                                            <p class="text-[10px] text-slate-400 mt-0.5">發布於 ${h.date}</p>
                                        </div>
                                        <div class="flex gap-1">
                                            <a href="${h.html_url}" target="_blank" class="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[9px] font-bold hover:bg-slate-200 transition-colors">📱 手機</a>
                                            <a href="${h.ix_url}" target="_blank" class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-[9px] font-bold hover:bg-indigo-100 transition-colors">💻 電腦</a>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }

                    return `
                    <div class="flex flex-col">
                        <div class="grid grid-cols-1 md:grid-cols-5 p-4 md:p-5 items-center hover:bg-slate-50 transition-colors ${index % 2 === 0 ? 'bg-white' : 'bg-slate-50/50'}">
                            <div class="col-span-1 flex items-center gap-3">
                                <span class="text-xl font-black tracking-tighter">${c.ticker}</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase hidden sm:inline">${c.name}</span>
                            </div>
                            <div class="col-span-1 text-center font-bold text-slate-700 text-sm">${c.date}</div>
                            <div class="col-span-1 text-center">
                                <span class="${bgClass} ${colorClass} px-3 py-1 rounded-full text-xs font-black">${countNumber} 天</span>
                            </div>
                            <div class="col-span-1 text-center">
                                <span class="text-[10px] font-bold text-slate-500">${statusLabel}</span>
                            </div>
                            <div class="col-span-1 text-right">
                                <button id="button-${c.ticker}" onclick="toggleHistory('${c.ticker}')" class="btn-toggle px-3 py-1.5 bg-slate-100 text-slate-500 rounded-lg text-[10px] font-bold hover:bg-slate-200 transition-all">
                                    歷史財報查詢 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                            </div>
                        </div>
                        <div id="history-${c.ticker}" class="history-panel bg-slate-100/50 border-t border-b border-slate-200">
                            ${historyHtml}
                        </div>
                    </div>
                    `;
                }).join('');
                document.getElementById('list').innerHTML = html;
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-slate-400">無法載入數據...</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
