<!DOCTYPE html>
<html lang="zh-TW" class="light"> <!-- 預設為 light 模式 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&P 500 財報追蹤 | 專業版 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 配置 Tailwind 支援 Class 模式的 Dark Mode -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <style>
        .history-panel { max-height: 0; opacity: 0; transition: max-height 0.3s ease-out, opacity 0.2s ease-in; overflow: hidden; }
        .history-panel.open { max-height: 1000px; opacity: 1; }
        .rotate-180 { transform: rotate(180deg); transition: transform 0.3s ease; }
        .rotate-0 { transform: rotate(0deg); transition: transform 0.3s ease; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        .dark .loader { border: 3px solid #334155; border-top: 3px solid #818cf8; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300">
    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- Header 區塊：包含標題與深色模式切換 -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black tracking-tighter text-slate-900 dark:text-white">S&P 500 財報追蹤</h1>
                <p class="text-slate-400 dark:text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Institutional Grade Earnings Monitor</p>
            </div>
            
            <!-- Dark Mode Toggle 按鈕 -->
            <button onclick="toggleTheme()" class="p-3 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:ring-2 hover:ring-indigo-500 transition-all text-slate-600 dark:text-amber-400 focus:outline-none">
                <svg id="theme-icon-moon" class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                <svg id="theme-icon-sun" class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            </button>
        </header>

        <!-- Hero Banner: 快速統計數據儀表板 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="p-5 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center transition-colors">
                <div id="stat-today" class="text-4xl font-black text-rose-500 dark:text-rose-400">0</div>
                <div class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-2 uppercase tracking-widest">🔥 今日發布</div>
            </div>
            <div class="p-5 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center transition-colors">
                <div id="stat-week" class="text-4xl font-black text-amber-500 dark:text-amber-400">0</div>
                <div class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-2 uppercase tracking-widest">⚡ 本週關注 (7天內)</div>
            </div>
            <div class="p-5 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center transition-colors">
                <div id="stat-total" class="text-4xl font-black text-indigo-500 dark:text-indigo-400">0</div>
                <div class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-2 uppercase tracking-widest">🏛️ 追蹤公司總數</div>
            </div>
        </div>

        <!-- 搜尋與篩選工具欄 -->
        <div class="flex flex-col md:flex-row gap-4 mb-6 justify-between items-center bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 transition-colors">
            <div class="relative w-full md:w-96">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input" oninput="onSearchInput()" placeholder="搜尋 Ticker 或 公司名稱..." class="block w-full pl-10 pr-3 py-2 bg-transparent border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 dark:text-white outline-none transition-all">
            </div>
            
            <div class="flex gap-3 w-full md:w-auto">
                <select id="sector-filter" onchange="filterData()" class="px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-300 outline-none focus:ring-2 focus:ring-indigo-500 truncate max-w-[150px] md:max-w-xs transition-colors">
                    <option value="all">所有產業</option>
                </select>
                <button onclick="expandAll()" class="px-3 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 rounded-xl text-[11px] font-bold hover:bg-indigo-50 dark:hover:bg-indigo-500/20 transition-all whitespace-nowrap shadow-sm">展開前30家</button>
                <button onclick="collapseAll()" class="px-3 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 rounded-xl text-[11px] font-bold hover:bg-rose-50 dark:hover:bg-rose-500/20 transition-all whitespace-nowrap shadow-sm">全部折疊</button>
            </div>
        </div>

        <div class="mb-2 px-2 flex justify-between items-center text-xs font-bold text-slate-400 dark:text-slate-500">
            <span id="display-count">載入中...</span>
            <span id="sort-indicator" class="text-indigo-500 dark:text-indigo-400">排序：倒數天數 ▴</span>
        </div>

        <!-- 數據表格區塊 -->
        <div class="bg-white dark:bg-slate-900 shadow-xl rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800 transition-colors">
            <!-- 表格頭部 -->
            <div class="hidden md:grid grid-cols-6 bg-slate-900 dark:bg-black text-white p-4 text-xs font-bold uppercase tracking-wider cursor-pointer">
                <div class="col-span-1">公司 / Ticker</div>
                <div class="col-span-1 text-center hover:text-indigo-300 dark:hover:text-indigo-400 transition-colors" onclick="setSort('sector')">產業 ⇅</div>
                <div class="col-span-1 text-center hover:text-indigo-300 dark:hover:text-indigo-400 transition-colors" onclick="setSort('date')">發布日 ⇅</div>
                <div class="col-span-1 text-center hover:text-indigo-300 dark:hover:text-indigo-400 transition-colors" onclick="setSort('days_left')">倒數 ⇅</div>
                <div class="col-span-1 text-center">狀態</div>
                <div class="col-span-1 text-right">操作</div>
            </div>

            <div id="list" class="divide-y divide-slate-100 dark:divide-slate-800">
                <div class="p-10 text-center text-slate-400 dark:text-slate-500 text-sm">
                    <div class="loader mb-3"></div>
                    正在拉取 S&P 500 數據，請稍候...
                </div>
            </div>
        </div>

        <!-- 分頁控制 -->
        <div class="flex justify-center items-center gap-4 mt-6">
            <button id="prev-page" onclick="changePage(-1)" class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50 transition-all">上一頁</button>
            <span id="page-info" class="text-xs font-bold text-slate-500 dark:text-slate-400">Page 1 / 1</span>
            <button id="next-page" onclick="changePage(1)" class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 disabled:opacity-50 transition-all">下一頁</button>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center pb-8">
            <div class="flex items-center justify-center gap-2">
                <p id="update-time" class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest"></p>
                <span id="update-status" class="px-2 py-0.5 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-500/30 rounded-full text-[9px] font-black uppercase tracking-tighter">
                    🔄 每日自動更新
                </span>
            </div>
        </footer>
    </div>

    <script>
        let ALL_DATA =[];
        let FILTERED_DATA =[];
        let currentPage = 1;
        let pageSize = 50;
        let currentSort = { field: 'days_left', direction: 'asc' };
        let searchTimeout = null;

        // -----------------------------
        // Dark Mode 邏輯
        // -----------------------------
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }
        initTheme(); // 頁面載入時初始化主題

        // -----------------------------
        // 輔助函數
        // -----------------------------
        function formatLocalTime(utcString) {
            const date = new Date(utcString);
            return date.toLocaleString(undefined, { 
                year: 'numeric', month: '2-digit', day: '2-digit', 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
            });
        }

        // -----------------------------
        // 數據計算與渲染
        // -----------------------------
        function updateDashboardStats(data) {
            const todayCount = data.filter(c => c.days_left === 0).length;
            const weekCount = data.filter(c => c.days_left > 0 && c.days_left <= 7).length;
            
            document.getElementById('stat-today').innerText = todayCount;
            document.getElementById('stat-week').innerText = weekCount;
            document.getElementById('stat-total').innerText = data.length;
        }

        function onSearchInput() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { filterData(); }, 300);
        }

        function setSort(field) {
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field;
                currentSort.direction = 'asc';
            }
            const indicators = { 'days_left': '倒數天數', 'date': '發布日期', 'sector': '產業類別' };
            document.getElementById('sort-indicator').innerText = `排序：${indicators[field]} ${currentSort.direction === 'asc' ? '▴' : '▾'}`;
            filterData();
        }

        function renderList(data) {
            const listElement = document.getElementById('list');
            document.getElementById('display-count').innerText = `目前顯示 ${data.length} 家公司`;

            if (data.length === 0) {
                listElement.innerHTML = '<div class="p-10 text-center text-slate-400 dark:text-slate-500">找不到匹配的公司...</div>';
                return;
            }

            const sortedData = [...data].sort((a, b) => {
                let valA = a[currentSort.field];
                let valB = b[currentSort.field];
                if (typeof valA === 'string') return currentSort.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                return currentSort.direction === 'asc' ? (valA - valB) : (valB - valA);
            });

            const start = (currentPage - 1) * pageSize;
            const pageData = sortedData.slice(start, start + pageSize);

            listElement.innerHTML = pageData.map((c, index) => {
                let countNumber = "--", statusLabel = "待定", badgeColor = "bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400";
                
                // 動態狀態標籤 (兼容暗黑模式)
                if (typeof c.days_left === 'number') {
                    countNumber = c.days_left;
                    if (c.days_left === 0) { 
                        statusLabel = "今日發布"; badgeColor = "bg-rose-500 text-white dark:bg-rose-600"; 
                    } else if (c.days_left <= 7) { 
                        statusLabel = "緊急"; badgeColor = "bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-400"; 
                    } else if (c.days_left <= 14) { 
                        statusLabel = "接近"; badgeColor = "bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400"; 
                    } else { 
                        statusLabel = "正常"; badgeColor = "bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-400"; 
                    }
                }

                const rowBg = index % 2 === 0 ? 'bg-white dark:bg-slate-900' : 'bg-slate-50/50 dark:bg-slate-800/30';

                return `
                <div class="flex flex-col border-b border-slate-100 dark:border-slate-800/50 last:border-0 hover:bg-slate-50 dark:hover:bg-slate-800/80 transition-colors duration-200">
                    <div class="grid grid-cols-1 md:grid-cols-6 p-4 md:p-3 items-center ${rowBg}">
                        <div class="col-span-1 flex items-center gap-3">
                            <span class="text-lg font-black tracking-tighter w-14 text-slate-900 dark:text-slate-100">${c.ticker}</span>
                            <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase hidden sm:inline truncate w-24" title="${c.name}">${c.name}</span>
                        </div>
                        <div class="col-span-1 text-center text-[10px] font-bold text-slate-500 dark:text-slate-400 truncate mt-1 md:mt-0" title="${c.sector}">${c.sector}</div>
                        <div class="col-span-1 text-center font-bold text-slate-700 dark:text-slate-200 text-sm mt-2 md:mt-0">
                            ${c.date} ${c.timing && c.timing !== 'Unknown' ? `<span class="text-[9px] text-indigo-500 dark:text-indigo-400 ml-1 bg-indigo-50 dark:bg-indigo-500/10 px-1 rounded">${c.timing}</span>` : ''}
                        </div>
                        <div class="col-span-1 text-center mt-2 md:mt-0">
                            <span class="${badgeColor} px-3 py-1 rounded-full text-xs font-black">${countNumber} 天</span>
                        </div>
                        <div class="col-span-1 text-center mt-1 md:mt-0">
                            <span class="text-[10px] font-bold text-slate-500 dark:text-slate-400">${statusLabel}</span>
                        </div>
                        <div class="col-span-1 text-right mt-3 md:mt-0">
                            <button id="button-${c.ticker}" onclick="toggleHistory('${c.ticker}')" class="btn-toggle px-3 py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-300 rounded-lg text-[10px] font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-all shadow-sm focus:outline-none">
                                歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div id="history-${c.ticker}" class="history-panel bg-slate-50 dark:bg-slate-900/50"></div>
                </div>`;
            }).join('');

            const totalPages = Math.ceil(data.length / pageSize) || 1;
            document.getElementById('page-info').innerText = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('prev-page').disabled = (currentPage === 1);
            document.getElementById('next-page').disabled = (currentPage === totalPages);
        }

        function changePage(dir) {
            currentPage += dir;
            renderList(FILTERED_DATA);
        }

        function renderHistoryContent(ticker) {
            const panel = document.getElementById('history-' + ticker);
            if (!panel || panel.innerHTML.trim() !== '') return;

            const company = ALL_DATA.find(c => c.ticker === ticker);
            if (!company) return;

            let historyHtml = '<p class="text-xs text-slate-400 dark:text-slate-500 p-6 text-center">暫無歷史財報數據</p>';
            if (company.history && company.history.length > 0) {
                historyHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-4">
                    ${company.history.map(h => `
                        <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-lg shadow-sm">
                            <div>
                                <p class="text-xs font-bold text-slate-700 dark:text-slate-200">${h.type}</p>
                                <p class="text-[10px] text-slate-400 dark:text-slate-500 mt-0.5">發布於 ${h.date}</p>
                            </div>
                            <div class="flex gap-1">
                                <a href="${h.html_url}" target="_blank" class="px-2 py-1 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded text-[9px] font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">📱 手機</a>
                                <a href="${h.ix_url}" target="_blank" class="px-2 py-1 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 rounded text-[9px] font-bold hover:bg-indigo-100 dark:hover:bg-indigo-500/40 transition-colors">💻 電腦</a>
                            </div>
                        </div>`).join('')}
                </div>`;
            }
            panel.innerHTML = historyHtml;
        }

        function toggleHistory(ticker) {
            const panel = document.getElementById('history-' + ticker);
            const btn = document.getElementById('button-' + ticker);
            const arrow = btn.querySelector('svg');
            const isOpen = panel.classList.toggle('open');
            if (isOpen) {
                renderHistoryContent(ticker);
                btn.innerHTML = '收起財報 ▴';
                btn.classList.replace('bg-slate-100', 'bg-indigo-100');
                btn.classList.replace('text-slate-500', 'text-indigo-700');
                btn.classList.replace('dark:bg-slate-800', 'dark:bg-indigo-500/20');
                btn.classList.replace('dark:text-slate-300', 'dark:text-indigo-400');
                arrow.classList.replace('rotate-0', 'rotate-180');
            } else {
                btn.innerHTML = '歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>';
                btn.classList.replace('bg-indigo-100', 'bg-slate-100');
                btn.classList.replace('text-indigo-700', 'text-slate-500');
                btn.classList.replace('dark:bg-indigo-500/20', 'dark:bg-slate-800');
                btn.classList.replace('dark:text-indigo-400', 'dark:text-slate-300');
                arrow.classList.replace('rotate-180', 'rotate-0');
            }
        }

        function filterData() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const sector = document.getElementById('sector-filter').value;
            FILTERED_DATA = ALL_DATA.filter(c => {
                const matchesSearch = c.ticker.toLowerCase().includes(search) || c.name.toLowerCase().includes(search);
                const matchesSector = sector === 'all' || c.sector === sector;
                return matchesSearch && matchesSector;
            });
            currentPage = 1; 
            renderList(FILTERED_DATA);
        }

        function expandAll() {
            const panels = document.querySelectorAll('.history-panel');
            let count = 0;
            panels.forEach(panel => {
                if (count < 30 && !panel.classList.contains('open')) {
                    const ticker = panel.id.replace('history-', '');
                    panel.classList.add('open');
                    renderHistoryContent(ticker);
                    const btn = document.getElementById('button-' + ticker);
                    if (btn) {
                        btn.innerHTML = '收起財報 ▴';
                        btn.classList.replace('bg-slate-100', 'bg-indigo-100');
                        btn.classList.replace('text-slate-500', 'text-indigo-700');
                        btn.classList.replace('dark:bg-slate-800', 'dark:bg-indigo-500/20');
                        btn.classList.replace('dark:text-slate-300', 'dark:text-indigo-400');
                    }
                    count++;
                }
            });
        }

        function collapseAll() {
            document.querySelectorAll('.history-panel').forEach(p => p.classList.remove('open'));
            document.querySelectorAll('.btn-toggle').forEach(btn => {
                btn.innerHTML = '歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>';
                btn.classList.replace('bg-indigo-100', 'bg-slate-100');
                btn.classList.replace('text-indigo-700', 'text-slate-500');
                btn.classList.replace('dark:bg-indigo-500/20', 'dark:bg-slate-800');
                btn.classList.replace('dark:text-indigo-400', 'dark:text-slate-300');
            });
        }

        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + new Date().getTime());
                const data = await res.json();
                ALL_DATA = data.companies;
                FILTERED_DATA = [...ALL_DATA];
                
                document.getElementById('update-time').innerText = "Last Updated: " + formatLocalTime(data.last_updated);
                updateDashboardStats(ALL_DATA); // 更新頂部 Hero Banner

                const sectors =[...new Set(ALL_DATA.map(c => c.sector))].sort();
                const sectorSelect = document.getElementById('sector-filter');
                sectorSelect.innerHTML = '<option value="all">所有產業</option>';
                sectors.forEach(s => {
                    if(s && s !== 'Unknown') {
                        const opt = document.createElement('option');
                        opt.value = s; opt.innerText = s;
                        sectorSelect.appendChild(opt);
                    }
                });

                filterData();
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-rose-500 font-bold">無法載入數據，請檢查後端是否更新成功...</div>';
            }
        }
        
        loadData();
    </script>
</body>
</html>
