<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M7 財報倒數時鐘</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .countdown-number { font-family: 'Monaco', monospace; }
    </style>
</head>
<body class="bg-slate-50">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl">
        <header class="bg-indigo-700 p-8 text-white">
            <h1 class="text-3xl font-black tracking-tighter">EARNINGS</h1>
            <p class="text-indigo-200 text-xs font-bold tracking-widest uppercase mt-1">Magnificent Seven Countdown</p>
        </header>

        <div id="list" class="divide-y divide-slate-100">
            <!-- 數據填入 -->
        </div>

        <footer class="p-6 text-center">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                Data refreshed every 24 hours
            </p>
            <p id="update-time" class="text-[10px] text-slate-300"></p>
        </footer>
    </div>

    <script>
        async function loadData() {
            const res = await fetch('./data.json?t=' + new Date().getTime());
            const data = await res.json();
            document.getElementById('update-time').innerText = "Last Update: " + data.last_updated;

            const html = data.companies.map(c => {
                let colorClass = "text-slate-900";
                let bgClass = "bg-slate-100";
                
                if (typeof c.days_left === 'number') {
                    if (c.days_left <= 7) { colorClass = "text-white"; bgClass = "bg-rose-500 animate-pulse"; }
                    else if (c.days_left <= 14) { colorClass = "text-rose-700"; bgClass = "bg-rose-50"; }
                    else { colorClass = "text-indigo-700"; bgClass = "bg-indigo-50"; }
                }

                return `
                <div class="p-6 flex justify-between items-center">
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="text-2xl font-black tracking-tighter">${c.ticker}</span>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase">${c.name}</p>
                        <div class="mt-4">
                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Expected Date</p>
                            <p class="text-sm font-bold text-slate-700">${c.date}</p>
                            <p class="text-[9px] font-bold text-indigo-400 mt-1">${c.status}</p>
                        </div>
                    </div>
                    
                    <div class="text-center">
                        <div class="${bgClass} ${colorClass} rounded-xl px-4 py-3 min-w-[80px]">
                            <p class="text-xs font-black uppercase leading-none mb-1 opacity-70">Days</p>
                            <p class="text-3xl font-black countdown-number leading-none">
                                ${typeof c.days_left === 'number' ? c.days_left : '--'}
                            </p>
                        </div>
                        <a href="${c.ir_link}" target="_blank" class="mt-3 inline-block text-[9px] font-black text-slate-300 hover:text-indigo-500 transition-colors uppercase tracking-widest">
                            IR Website ↗
                        </a>
                    </div>
                </div>
                `;
            }).join('');
            document.getElementById('list').innerHTML = html;
        }
        loadData();
    </script>
</body>
</html>
