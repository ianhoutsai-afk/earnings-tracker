<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S&P 500 財報追蹤 | 專業版 Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
    <style>
        .history-panel { max-height: 0; opacity: 0; transition: max-height 0.3s ease-out, opacity 0.2s ease-in; overflow: hidden; }
        .history-panel.open { max-height: 1000px; opacity: 1; }
        .rotate-180 { transform: rotate(180deg); transition: transform 0.3s ease; }
        .rotate-0 { transform: rotate(0deg); transition: transform 0.3s ease; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; margin: 0 auto; }
        .dark .loader { border: 3px solid #334155; border-top: 3px solid #818cf8; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        /* 隱藏滾動條但保持可滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans transition-colors duration-300">
    <div class="max-w-6xl mx-auto px-4 py-8">
        
        <!-- Header -->
        <header class="mb-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black tracking-tighter text-slate-900 dark:text-white">S&P 500 財報追蹤</h1>
                <p class="text-slate-400 dark:text-slate-500 text-xs font-bold uppercase tracking-widest mt-2">Institutional Grade Earnings Monitor</p>
            </div>
            
            <button onclick="toggleTheme()" class="p-3 rounded-full bg-white dark:bg-slate-800 shadow-sm border border-slate-200 dark:border-slate-700 hover:ring-2 hover:ring-indigo-500 transition-all text-slate-600 dark:text-amber-400 focus:outline-none">
                <svg id="theme-icon-moon" class="w-5 h-5 hidden dark:block" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"></path></svg>
                <svg id="theme-icon-sun" class="w-5 h-5 block dark:hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            </button>
        </header>

        <!-- Hero Banner -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="p-5 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center">
                <div id="stat-today" class="text-4xl font-black text-rose-500 dark:text-rose-400">0</div>
                <div class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-2 uppercase tracking-widest">🔥 今日發布</div>
            </div>
            <div class="p-5 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center">
                <div id="stat-week" class="text-4xl font-black text-amber-500 dark:text-amber-400">0</div>
                <div class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-2 uppercase tracking-widest">⚡ 本週關注 (7天內)</div>
            </div>
            <div class="p-5 bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col items-center justify-center">
                <div id="stat-total" class="text-4xl font-black text-indigo-500 dark:text-indigo-400">0</div>
                <div class="text-xs font-bold text-slate-400 dark:text-slate-500 mt-2 uppercase tracking-widest">🏛️ 追蹤公司總數</div>
            </div>
        </div>

        <!-- 搜尋與篩選工具欄 -->
        <div class="flex flex-col md:flex-row gap-4 mb-6 justify-between items-center bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="relative w-full md:w-80">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </span>
                <input type="text" id="search-input" oninput="onSearchInput()" placeholder="搜尋 Ticker 或 公司名稱..." class="block w-full pl-10 pr-3 py-2 bg-transparent border border-slate-200 dark:border-slate-700 rounded-xl text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all">
            </div>
            
            <div class="flex flex-wrap gap-3 w-full md:w-auto items-center">
                <!-- 新增：只看收藏 Toggle -->
                <label class="flex items-center gap-2 text-xs font-bold text-slate-600 dark:text-slate-300 cursor-pointer mr-2 select-none">
                    <input type="checkbox" id="fav-filter" onchange="filterData()" class="w-4 h-4 text-amber-500 bg-slate-100 border-slate-300 rounded focus:ring-amber-500 dark:bg-slate-700 dark:border-slate-600">
                    ⭐ 只看收藏
                </label>

                <select id="sector-filter" onchange="filterData()" class="px-3 py-2 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl text-xs font-bold text-slate-600 dark:text-slate-300 outline-none focus:ring-2 focus:ring-indigo-500 truncate max-w-[120px]">
                    <option value="all">所有產業</option>
                </select>
                <button onclick="expandAll()" class="px-3 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-300 rounded-xl text-[11px] font-bold hover:bg-indigo-50 dark:hover:bg-indigo-500/20 transition-all shadow-sm">展開前30</button>
            </div>
        </div>

        <div class="mb-2 px-2 flex justify-between items-center text-xs font-bold text-slate-400 dark:text-slate-500">
            <span id="display-count">載入中...</span>
            <span id="sort-indicator" class="text-indigo-500 dark:text-indigo-400">排序：倒數天數 ▴</span>
        </div>

        <!-- 數據表格區塊 -->
        <div class="bg-white dark:bg-slate-900 shadow-xl rounded-2xl overflow-hidden border border-slate-200 dark:border-slate-800">
            <!-- 表格頭部 (Desktop only) -->
            <div class="hidden md:grid grid-cols-12 bg-slate-900 dark:bg-black text-white p-4 text-xs font-bold uppercase tracking-wider cursor-pointer">
                <div class="col-span-3">公司 / Ticker</div>
                <div class="col-span-3 text-center hover:text-indigo-300 dark:hover:text-indigo-400" onclick="setSort('sector')">產業 ⇅</div>
                <div class="col-span-2 text-center hover:text-indigo-300 dark:hover:text-indigo-400" onclick="setSort('date')">發布日 ⇅</div>
                <div class="col-span-2 text-center hover:text-indigo-300 dark:hover:text-indigo-400" onclick="setSort('days_left')">狀態 / 倒數 ⇅</div>
                <div class="col-span-2 text-right">操作</div>
            </div>

            <div id="list" class="divide-y divide-slate-100 dark:divide-slate-800/80">
                <div class="p-10 text-center text-slate-400 dark:text-slate-500 text-sm">
                    <div class="loader mb-3"></div>
                    正在拉取 S&P 500 數據，請稍候...
                </div>
            </div>
        </div>

        <!-- 分頁控制 -->
        <div class="flex justify-center items-center gap-4 mt-6">
            <button id="prev-page" onclick="changePage(-1)" class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold disabled:opacity-50 transition-all">上一頁</button>
            <span id="page-info" class="text-xs font-bold text-slate-500 dark:text-slate-400">Page 1 / 1</span>
            <button id="next-page" onclick="changePage(1)" class="px-4 py-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg text-xs font-bold disabled:opacity-50 transition-all">下一頁</button>
        </div>

        <footer class="mt-8 text-center pb-8">
            <div class="flex items-center justify-center gap-2">
                <p id="update-time" class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-widest"></p>
                <span id="update-status" class="px-2 py-0.5 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 border border-indigo-100 dark:border-indigo-500/30 rounded-full text-[9px] font-black uppercase tracking-tighter">
                    🔄 每日自動更新
                </span>
            </div>
        </footer>
    </div>

    <script>
        let ALL_DATA =[];
        let FILTERED_DATA = [];
        let WATCHLIST = JSON.parse(localStorage.getItem('watchlist')) ||[]; // 載入收藏名單
        
        let currentPage = 1;
        let pageSize = 50;
        let currentSort = { field: 'days_left', direction: 'asc' };
        let searchTimeout = null;

        // -----------------------------
        // Theme & Utility
        // -----------------------------
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else { document.documentElement.classList.remove('dark'); }
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark'); localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark'); localStorage.theme = 'dark';
            }
        }
        initTheme();

        function formatLocalTime(utcString) {
            const date = new Date(utcString);
            return date.toLocaleString(undefined, { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false });
        }

        function checkUpdateHealth(lastUpdatedStr) {
            try {
                const diffHours = Math.floor((new Date() - new Date(lastUpdatedStr)) / 3600000);
                if (diffHours > 26) { 
                    const b = document.getElementById('update-status');
                    b.innerText = "⚠️ 更新延遲中";
                    b.className = "px-2 py-0.5 bg-rose-50 dark:bg-rose-500/20 text-rose-600 dark:text-rose-400 border border-rose-100 dark:border-rose-500/30 rounded-full text-[9px] font-black uppercase tracking-tighter";
                }
            } catch (e) {}
        }

        // -----------------------------
        // Watchlist Logic
        // -----------------------------
        function toggleWatchlist(ticker, event) {
            event.stopPropagation(); // 防止觸發其他點擊事件
            if (WATCHLIST.includes(ticker)) {
                WATCHLIST = WATCHLIST.filter(t => t !== ticker);
            } else {
                WATCHLIST.push(ticker);
            }
            localStorage.setItem('watchlist', JSON.stringify(WATCHLIST));
            renderList(FILTERED_DATA); // 重新渲染以更新星星狀態與排序
        }

        function updateDashboardStats(data) {
            document.getElementById('stat-today').innerText = data.filter(c => c.days_left === 0).length;
            document.getElementById('stat-week').innerText = data.filter(c => c.days_left > 0 && c.days_left <= 7).length;
            document.getElementById('stat-total').innerText = data.length;
        }

        function onSearchInput() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { filterData(); }, 300);
        }

        function setSort(field) {
            if (currentSort.field === field) {
                currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.field = field; currentSort.direction = 'asc';
            }
            const indicators = { 'days_left': '倒數天數', 'date': '發布日期', 'sector': '產業類別' };
            document.getElementById('sort-indicator').innerText = `排序：${indicators[field]} ${currentSort.direction === 'asc' ? '▴' : '▾'}`;
            filterData();
        }

        // -----------------------------
        // Render Logic (Mobile Card View)
        // -----------------------------
        function renderList(data) {
            const listElement = document.getElementById('list');
            document.getElementById('display-count').innerText = `目前顯示 ${data.length} 家公司`;

            if (data.length === 0) {
                listElement.innerHTML = '<div class="p-10 text-center text-slate-400 dark:text-slate-500">找不到匹配的公司...</div>';
                return;
            }

            // 排序邏輯：收藏的永遠置頂，其次按 currentSort 排序
            const sortedData = [...data].sort((a, b) => {
                const isFavA = WATCHLIST.includes(a.ticker);
                const isFavB = WATCHLIST.includes(b.ticker);
                
                if (isFavA && !isFavB) return -1;
                if (!isFavA && isFavB) return 1;

                let valA = a[currentSort.field];
                let valB = b[currentSort.field];
                if (typeof valA === 'string') return currentSort.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
                return currentSort.direction === 'asc' ? (valA - valB) : (valB - valA);
            });

            const start = (currentPage - 1) * pageSize;
            const pageData = sortedData.slice(start, start + pageSize);

            listElement.innerHTML = pageData.map((c, index) => {
                let countNumber = "--", statusLabel = "待定", badgeColor = "bg-slate-100 text-slate-600 dark:bg-slate-800 dark:text-slate-400";
                
                if (typeof c.days_left === 'number') {
                    countNumber = c.days_left;
                    if (c.days_left === 0) { statusLabel = "今日發布"; badgeColor = "bg-rose-500 text-white dark:bg-rose-600 dark:text-white"; } 
                    else if (c.days_left <= 7) { statusLabel = "緊急"; badgeColor = "bg-rose-100 text-rose-700 dark:bg-rose-500/20 dark:text-rose-400"; } 
                    else if (c.days_left <= 14) { statusLabel = "接近"; badgeColor = "bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400"; } 
                    else { statusLabel = "正常"; badgeColor = "bg-indigo-100 text-indigo-700 dark:bg-indigo-500/20 dark:text-indigo-400"; }
                }

                const isFav = WATCHLIST.includes(c.ticker);
                const starIcon = isFav 
                    ? `<svg class="w-5 h-5 text-amber-400 fill-current drop-shadow-sm" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>`
                    : `<svg class="w-5 h-5 text-slate-300 dark:text-slate-600 hover:text-amber-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>`;

                const rowBg = index % 2 === 0 ? 'bg-white dark:bg-slate-900' : 'bg-slate-50/40 dark:bg-slate-800/20';

                return `
                <div class="flex flex-col border-b border-slate-100 dark:border-slate-800/50 last:border-0 hover:bg-slate-50 dark:hover:bg-slate-800/60 transition-colors duration-200">
                    <!-- Mobile: Flex Card / Desktop: Grid Row -->
                    <div class="flex flex-col md:grid md:grid-cols-12 p-4 md:p-3 gap-3 md:gap-0 items-start md:items-center ${rowBg}">
                        
                        <!-- Col 1: Ticker & Name -->
                        <div class="col-span-3 flex items-center gap-2 w-full md:w-auto justify-between md:justify-start">
                            <div class="flex items-center gap-2">
                                <button onclick="toggleWatchlist('${c.ticker}', event)" class="focus:outline-none" title="加入/移除收藏">
                                    ${starIcon}
                                </button>
                                <span class="text-xl md:text-lg font-black tracking-tighter w-16 text-slate-900 dark:text-slate-100">${c.ticker}</span>
                                <span class="text-[11px] font-bold text-slate-400 dark:text-slate-500 uppercase truncate max-w-[120px] md:max-w-[100px]" title="${c.name}">${c.name}</span>
                            </div>
                            <!-- Mobile only: Status Badge in top right -->
                            <div class="md:hidden">
                                <span class="${badgeColor} px-3 py-1 rounded-full text-xs font-black shadow-sm">${countNumber} 天</span>
                            </div>
                        </div>

                        <!-- Col 2: Sector -->
                        <div class="col-span-3 text-[11px] md:text-center font-bold text-slate-500 dark:text-slate-400 truncate w-full" title="${c.sector}">
                            <span class="md:hidden text-slate-400 mr-1">產業:</span>${c.sector}
                        </div>

                        <!-- Col 3: Date -->
                        <div class="col-span-2 md:text-center font-bold text-slate-700 dark:text-slate-200 text-sm w-full">
                            <span class="md:hidden text-[11px] text-slate-400 font-normal mr-1">日期:</span>
                            ${c.date} ${c.timing && c.timing !== 'Unknown' ? `<span class="text-[9px] text-indigo-500 dark:text-indigo-400 ml-1 bg-indigo-50 dark:bg-indigo-500/10 px-1 rounded border border-indigo-100 dark:border-indigo-500/20">${c.timing}</span>` : ''}
                        </div>

                        <!-- Col 4: Status (Desktop only) -->
                        <div class="col-span-2 hidden md:flex flex-col items-center justify-center">
                            <span class="${badgeColor} px-3 py-1 rounded-full text-[11px] font-black shadow-sm">${countNumber} 天</span>
                            <span class="text-[9px] font-bold text-slate-400 mt-1">${statusLabel}</span>
                        </div>

                        <!-- Col 5: Action Button -->
                        <div class="col-span-2 w-full md:w-auto md:text-right mt-2 md:mt-0">
                            <button id="button-${c.ticker}" onclick="toggleHistory('${c.ticker}')" class="w-full md:w-auto btn-toggle px-4 md:px-3 py-2 md:py-1.5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-xl md:rounded-lg text-xs md:text-[10px] font-bold hover:bg-slate-200 dark:hover:bg-slate-700 transition-all shadow-sm focus:outline-none">
                                歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div id="history-${c.ticker}" class="history-panel bg-slate-50/80 dark:bg-slate-900/50"></div>
                </div>`;
            }).join('');

            const totalPages = Math.ceil(data.length / pageSize) || 1;
            document.getElementById('page-info').innerText = `Page ${currentPage} / ${totalPages}`;
            document.getElementById('prev-page').disabled = (currentPage === 1);
            document.getElementById('next-page').disabled = (currentPage === totalPages);
        }

        function changePage(dir) { currentPage += dir; renderList(FILTERED_DATA); window.scrollTo({top: 200, behavior: 'smooth'}); }

        function renderHistoryContent(ticker) {
            const panel = document.getElementById('history-' + ticker);
            if (!panel || panel.innerHTML.trim() !== '') return;
            const company = ALL_DATA.find(c => c.ticker === ticker);
            if (!company) return;

            let historyHtml = '<p class="text-xs text-slate-400 dark:text-slate-500 p-6 text-center">暫無歷史財報數據</p>';
            if (company.history && company.history.length > 0) {
                historyHtml = `<div class="grid grid-cols-1 md:grid-cols-2 gap-3 p-4">
                    ${company.history.map(h => `
                        <div class="flex items-center justify-between p-3 bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-xl shadow-sm">
                            <div>
                                <p class="text-[11px] font-bold text-slate-700 dark:text-slate-200">${h.type}</p>
                                <p class="text-[9px] text-slate-400 dark:text-slate-500 mt-0.5">發布於 ${h.date}</p>
                            </div>
                            <div class="flex gap-1">
                                <a href="${h.html_url}" target="_blank" class="px-2 py-1.5 bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded-lg text-[10px] font-bold hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">📱 手機</a>
                                <a href="${h.ix_url}" target="_blank" class="px-2 py-1.5 bg-indigo-50 dark:bg-indigo-500/20 text-indigo-600 dark:text-indigo-400 rounded-lg text-[10px] font-bold hover:bg-indigo-100 dark:hover:bg-indigo-500/40 transition-colors">💻 電腦</a>
                            </div>
                        </div>`).join('')}
                </div>`;
            }
            // 增加一個「分享此公司」的小按鈕
            const shareUrl = `${window.location.origin}${window.location.pathname}?ticker=${ticker}`;
            const shareHtml = `
                <div class="px-4 pb-3 flex justify-end">
                    <button onclick="navigator.clipboard.writeText('${shareUrl}'); alert('已複製分享連結！');" class="text-[10px] font-bold text-slate-400 hover:text-indigo-500 transition-colors flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                        分享此公司卡片
                    </button>
                </div>
            `;
            panel.innerHTML = historyHtml + shareHtml;
        }

        function toggleHistory(ticker) {
            const panel = document.getElementById('history-' + ticker);
            const btn = document.getElementById('button-' + ticker);
            const arrow = btn.querySelector('svg');
            const isOpen = panel.classList.toggle('open');
            if (isOpen) {
                renderHistoryContent(ticker);
                btn.innerHTML = '收起財報 ▴';
                btn.classList.replace('bg-slate-100', 'bg-indigo-100'); btn.classList.replace('text-slate-600', 'text-indigo-700');
                btn.classList.replace('dark:bg-slate-800', 'dark:bg-indigo-500/20'); btn.classList.replace('dark:text-slate-300', 'dark:text-indigo-400');
            } else {
                btn.innerHTML = '歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>';
                btn.classList.replace('bg-indigo-100', 'bg-slate-100'); btn.classList.replace('text-indigo-700', 'text-slate-600');
                btn.classList.replace('dark:bg-indigo-500/20', 'dark:bg-slate-800'); btn.classList.replace('dark:text-indigo-400', 'dark:text-slate-300');
            }
        }

        function filterData() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const sector = document.getElementById('sector-filter').value;
            const favOnly = document.getElementById('fav-filter').checked;
            
            FILTERED_DATA = ALL_DATA.filter(c => {
                const matchesSearch = c.ticker.toLowerCase().includes(search) || c.name.toLowerCase().includes(search);
                const matchesSector = sector === 'all' || c.sector === sector;
                const matchesFav = !favOnly || WATCHLIST.includes(c.ticker);
                return matchesSearch && matchesSector && matchesFav;
            });
            currentPage = 1; 
            renderList(FILTERED_DATA);
        }

        function expandAll() {
            const panels = document.querySelectorAll('.history-panel');
            let count = 0;
            panels.forEach(panel => {
                if (count < 30 && !panel.classList.contains('open')) {
                    const ticker = panel.id.replace('history-', '');
                    panel.classList.add('open');
                    renderHistoryContent(ticker);
                    const btn = document.getElementById('button-' + ticker);
                    if (btn) {
                        btn.innerHTML = '收起財報 ▴';
                        btn.classList.replace('bg-slate-100', 'bg-indigo-100'); btn.classList.replace('text-slate-600', 'text-indigo-700');
                        btn.classList.replace('dark:bg-slate-800', 'dark:bg-indigo-500/20'); btn.classList.replace('dark:text-slate-300', 'dark:text-indigo-400');
                    }
                    count++;
                }
            });
        }

        function collapseAll() {
            document.querySelectorAll('.history-panel').forEach(p => p.classList.remove('open'));
            document.querySelectorAll('.btn-toggle').forEach(btn => {
                btn.innerHTML = '歷史財報 <svg class="inline w-3 h-3 rotate-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path></svg>';
                btn.classList.replace('bg-indigo-100', 'bg-slate-100'); btn.classList.replace('text-indigo-700', 'text-slate-600');
                btn.classList.replace('dark:bg-indigo-500/20', 'dark:bg-slate-800'); btn.classList.replace('dark:text-indigo-400', 'dark:text-slate-300');
            });
        }

        // -----------------------------
        // Deep Linking (URL 參數讀取)
        // -----------------------------
        function checkUrlParams() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetTicker = urlParams.get('ticker');
            
            if (targetTicker) {
                const upperTicker = targetTicker.toUpperCase();
                document.getElementById('search-input').value = upperTicker;
                filterData(); // 觸發搜尋
                
                // 等待 DOM 渲染完畢後，自動展開歷史財報
                setTimeout(() => {
                    const btn = document.getElementById(`button-${upperTicker}`);
                    if (btn) {
                        btn.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        toggleHistory(upperTicker);
                    }
                }, 300);
            }
        }

        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + new Date().getTime());
                const data = await res.json();
                ALL_DATA = data.companies;
                FILTERED_DATA = [...ALL_DATA];
                
                document.getElementById('update-time').innerText = "Last Updated: " + formatLocalTime(data.last_updated);
                updateDashboardStats(ALL_DATA); 
                checkUpdateHealth(data.last_updated);

                const sectors =[...new Set(ALL_DATA.map(c => c.sector))].sort();
                const sectorSelect = document.getElementById('sector-filter');
                sectors.forEach(s => {
                    if(s && s !== 'Unknown') {
                        const opt = document.createElement('option');
                        opt.value = s; opt.innerText = s;
                        sectorSelect.appendChild(opt);
                    }
                });

                filterData();
                checkUrlParams(); // 執行深度連結檢查
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-rose-500 font-bold">無法載入數據...</div>';
            }
        }
        
        loadData();
    </script>
</body>
</html>
