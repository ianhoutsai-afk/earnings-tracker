<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財報追蹤網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl">
        <header class="bg-indigo-700 p-6 flex items-center justify-center">
            <h1 class="text-xl font-bold tracking-widest text-white">財報追蹤網站</h1>
        </header>

        <div id="list" class="divide-y divide-slate-100">
            <div class="p-10 text-center text-slate-400 text-sm">正在獲取最新財報日...</div>
        </div>

        <footer class="p-6 text-center border-t border-slate-100 mt-4">
            <p id="update-time" class="text-[10px] text-slate-400 font-bold"></p>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + new Date().getTime());
                const data = await res.json();
                document.getElementById('update-time').innerText = "最後更新於: " + data.last_updated;

                const html = data.companies.map(c => {
                    let colorClass = "text-slate-800";
                    let bgClass = "bg-slate-100";
                    let countNumber = "--";
                    
                    if (typeof c.days_left === 'number') {
                        countNumber = c.days_left;
                        if (c.days_left === 0) { colorClass = "text-white"; bgClass = "bg-rose-500 animate-pulse"; }
                        else if (c.days_left <= 7) { colorClass = "text-rose-700"; bgClass = "bg-rose-50"; }
                        else { colorClass = "text-indigo-700"; bgClass = "bg-indigo-50"; }
                    }

                    return `
                    <div class="p-6 flex justify-between items-center hover:bg-slate-50 transition-colors">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-2xl font-black tracking-tighter">${c.ticker}</span>
                            </div>
                            <p class="text-[11px] font-bold text-slate-400 uppercase">${c.name}</p>
                            
                            <div class="mt-4">
                                <p class="text-[10px] font-bold text-slate-400 tracking-widest">預計發布日</p>
                                <p class="text-sm font-bold text-slate-800">${c.date}</p>
                            </div>
                        </div>
                        
                        <div class="text-center">
                            <div class="${bgClass} ${colorClass} rounded-xl px-4 py-3 min-w-[85px] border border-transparent shadow-sm">
                                <p class="text-xs font-black mb-1 opacity-80">${c.days_left === 0 ? '今日發布' : '倒數天數'}</p>
                                <p class="text-3xl font-black leading-none">${countNumber}</p>
                            </div>
                            <a href="${c.ir_link}" target="_blank" class="mt-3 inline-block text-[10px] font-bold text-blue-500 hover:text-blue-700">
                                官方網站 ↗
                            </a>
                        </div>
                    </div>
                    `;
                }).join('');
                document.getElementById('list').innerHTML = html;
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-slate-400">數據等待更新中...</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
