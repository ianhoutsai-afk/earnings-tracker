<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M7 財報追蹤</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
        <header class="bg-slate-900 p-6 pt-12 text-white">
            <h1 class="text-2xl font-black italic tracking-tighter">M7 Tracker</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest">Earnings Countdown</p>
        </header>

        <main id="list" class="flex-grow divide-y divide-gray-100">
            <!-- 數據載入 -->
        </main>
        
        <footer class="p-8 text-center text-[10px] text-gray-400 font-bold tracking-widest uppercase bg-gray-50 border-t">
            Last Updated: <span id="update-time">--</span>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                document.getElementById('update-time').innerText = data.last_updated;
                
                const listHtml = data.companies.map(c => {
                    let badgeClass = "text-slate-400 bg-slate-100";
                    if (typeof c.days_left === 'number') {
                        if (c.days_left <= 7) badgeClass = "text-rose-600 bg-rose-50";
                        else if (c.days_left <= 14) badgeClass = "text-amber-600 bg-amber-50";
                        else badgeClass = "text-emerald-600 bg-emerald-50";
                    }

                    return `
                    <div class="p-6 flex justify-between items-center transition active:bg-gray-50">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="text-xl font-black tracking-tighter">${c.ticker}</span>
                                <span class="text-[10px] font-bold text-gray-400 border border-gray-200 px-1 rounded">${c.name}</span>
                            </div>
                            <div class="mt-2">
                                <a href="${c.ir_link}" target="_blank" class="text-[10px] font-bold text-blue-500 hover:underline tracking-widest uppercase">
                                    IR Reports ↗
                                </a>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-1">Date</p>
                            <p class="text-sm font-bold text-slate-800">${c.date}</p>
                            <div class="mt-1 inline-block px-2 py-0.5 rounded text-[10px] font-black ${badgeClass}">
                                ${typeof c.days_left === 'number' 
                                    ? (c.days_left > 0 ? 'T-MINUS ' + c.days_left + ' D' : (c.days_left == 0 ? 'RELEASING TODAY' : 'PASSED'))
                                    : 'PENDING'}
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
                document.getElementById('list').innerHTML = listHtml;
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-gray-400 italic text-xs">數據載入中...</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
