<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>財報追蹤網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 簡單的折疊選單切換功能
        function toggleHistory(ticker) {
            const el = document.getElementById('history-' + ticker);
            if (el.classList.contains('hidden')) {
                el.classList.remove('hidden');
            } else {
                el.classList.add('hidden');
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl">
        <header class="bg-indigo-700 p-6 flex items-center justify-center">
            <h1 class="text-xl font-bold tracking-widest text-white">財報追蹤網站</h1>
        </header>

        <div id="list" class="divide-y divide-slate-100">
            <div class="p-10 text-center text-slate-400 text-sm">數據加載與 SEC 連線中...</div>
        </div>

        <footer class="p-6 text-center border-t border-slate-100 mt-4">
            <p class="text-[10px] text-slate-400 font-bold tracking-widest">每 24 小時自動更新</p>
            <p id="update-time" class="text-[10px] text-slate-300 mt-1"></p>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const res = await fetch('./data.json?t=' + new Date().getTime());
                const data = await res.json();
                document.getElementById('update-time').innerText = "最後更新: " + data.last_updated;

                const html = data.companies.map(c => {
                    // 天數顏色判斷
                    let colorClass = "text-slate-800"; let bgClass = "bg-slate-100";
                    let countNumber = "--";
                    if (typeof c.days_left === 'number') {
                        countNumber = c.days_left;
                        if (c.days_left === 0) { colorClass = "text-white"; bgClass = "bg-rose-500 animate-pulse"; }
                        else if (c.days_left <= 7) { colorClass = "text-rose-700"; bgClass = "bg-rose-50"; }
                        else if (c.days_left <= 14) { colorClass = "text-amber-700"; bgClass = "bg-amber-50"; }
                        else { colorClass = "text-indigo-700"; bgClass = "bg-indigo-50"; }
                    }

                    // 渲染歷史財報列表 (如果沒有數據則顯示提示)
                    let historyHtml = '<p class="text-xs text-slate-400 p-4">目前無法獲取歷史財報</p>';
                    if (c.history && c.history.length > 0) {
                        historyHtml = c.history.map(h => `
                            <div class="py-3 flex items-center justify-between border-b border-slate-50 last:border-0">
                                <div>
                                    <p class="text-xs font-bold text-slate-700">${h.type}</p>
                                    <p class="text-[10px] text-slate-400 mt-0.5">發布於 ${h.date}</p>
                                </div>
                                <div class="flex gap-2">
                                    <a href="${h.html_url}" target="_blank" class="px-2 py-1 bg-slate-100 text-slate-600 rounded text-[9px] font-bold hover:bg-slate-200">
                                        📱 手機版
                                    </a>
                                    <a href="${h.ix_url}" target="_blank" class="px-2 py-1 bg-indigo-50 text-indigo-600 rounded text-[9px] font-bold hover:bg-indigo-100">
                                        💻 電腦版
                                    </a>
                                </div>
                            </div>
                        `).join('');
                    }

                    return `
                    <div class="flex flex-col hover:bg-slate-50 transition-colors">
                        <!-- 上半部：原有的倒數計時介面 -->
                        <div class="p-6 flex justify-between items-center">
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl font-black tracking-tighter">${c.ticker}</span>
                                </div>
                                <p class="text-[11px] font-bold text-slate-400 uppercase">${c.name}</p>
                                
                                <div class="mt-4">
                                    <p class="text-[10px] font-bold text-slate-400 tracking-widest">預計發布日</p>
                                    <p class="text-sm font-bold text-slate-800">${c.date}</p>
                                </div>
                            </div>
                            
                            <div class="text-center">
                                <div class="${bgClass} ${colorClass} rounded-xl px-4 py-3 min-w-[85px] border border-white/50 shadow-sm">
                                    <p class="text-xs font-black mb-1 opacity-80">${c.days_left === 0 ? '今日' : '倒數天數'}</p>
                                    <p class="text-3xl font-black leading-none">${countNumber}</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 展開按鈕 -->
                        <div class="px-6 pb-4">
                            <button onclick="toggleHistory('${c.ticker}')" class="w-full py-2 bg-slate-100 text-slate-500 rounded-lg text-xs font-bold hover:bg-slate-200 transition-colors flex justify-center items-center gap-1">
                                歷史財報查詢 (SEC)
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                        </div>

                        <!-- 隱藏的歷史財報區塊 -->
                        <div id="history-${c.ticker}" class="hidden px-6 pb-6 bg-white">
                            <div class="border border-slate-100 rounded-lg p-3 bg-white shadow-inner">
                                ${historyHtml}
                            </div>
                        </div>
                    </div>
                    `;
                }).join('');
                document.getElementById('list').innerHTML = html;
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-slate-400">無法載入數據，請檢查更新狀態。</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
