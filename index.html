<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M7 財報觀測站</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
        <!-- 頂部導航 -->
        <header class="bg-slate-900 p-6 pt-10 text-white sticky top-0 z-10">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-xl font-black tracking-tight text-indigo-400">RESEARCH</h1>
                    <p class="text-xs text-slate-400">Magnificent Seven Expectations</p>
                </div>
                <div class="text-right">
                    <p class="text-[9px] uppercase text-slate-500 font-bold">Updated</p>
                    <p id="update-time" class="text-xs text-slate-300">--:--</p>
                </div>
            </div>
        </header>

        <!-- 數據清單 -->
        <main id="list" class="flex-grow divide-y divide-gray-100">
            <div class="p-10 text-center text-gray-400">正在分析市場數據...</div>
        </main>
        
        <footer class="p-8 text-center bg-gray-50 border-t border-gray-100">
            <p class="text-[10px] text-gray-400 tracking-widest uppercase">Fundamental Analysis Tracker</p>
        </footer>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('./data.json?t=' + new Date().getTime());
                const data = await response.json();
                document.getElementById('update-time').innerText = data.last_updated.split(' ')[0];
                
                const listHtml = data.companies.map(c => {
                    // 計算天數顏色
                    let dayStyle = "text-slate-400 bg-slate-50";
                    if (typeof c.days_left === 'number') {
                        if (c.days_left <= 7) dayStyle = "text-rose-600 bg-rose-50";
                        else if (c.days_left <= 14) dayStyle = "text-amber-600 bg-amber-50";
                    }

                    return `
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-2xl font-black tracking-tighter text-slate-800">${c.ticker}</h2>
                                <p class="text-[11px] font-bold text-slate-400 uppercase tracking-tighter">${c.name}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-[10px] font-black px-2 py-1 rounded-full ${dayStyle}">
                                    ${typeof c.days_left === 'number' 
                                        ? (c.days_left > 0 ? 'IN ' + c.days_left + ' DAYS' : (c.days_left == 0 ? 'RELEASE TODAY' : 'RECENTLY RELEASED'))
                                        : 'PENDING'}
                                </span>
                            </div>
                        </div>
                        
                        <!-- 預期數據卡片 -->
                        <div class="grid grid-cols-2 gap-px bg-gray-200 border border-gray-200 rounded-lg overflow-hidden">
                            <div class="bg-white p-3">
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">EST. EPS</p>
                                <p class="text-sm font-bold text-slate-700">${c.eps_estimate}</p>
                            </div>
                            <div class="bg-white p-3">
                                <p class="text-[9px] font-black text-slate-400 uppercase mb-1">EST. REVENUE</p>
                                <p class="text-sm font-bold text-slate-700">${c.rev_estimate}</p>
                            </div>
                        </div>

                        <div class="mt-4 flex justify-between items-end">
                            <div class="text-[11px]">
                                <span class="text-slate-400 font-bold uppercase">Next Date:</span>
                                <span class="text-slate-700 font-bold ml-1">${c.date}</span>
                            </div>
                            <a href="${c.ir_link}" target="_blank" class="text-[10px] font-extrabold text-indigo-600 border-b-2 border-indigo-100 hover:border-indigo-600 transition-all">
                                IR SITE ↗
                            </a>
                        </div>
                    </div>
                    `;
                }).join('');
                
                document.getElementById('list').innerHTML = listHtml;
            } catch (e) {
                document.getElementById('list').innerHTML = '<div class="p-10 text-center text-gray-400 text-xs">等待數據同步中...</div>';
            }
        }
        loadData();
    </script>
</body>
</html>
