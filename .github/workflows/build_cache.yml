name: Build S&P 500 Cache

on:
  workflow_dispatch: # 這個設定讓我們可以「手動點擊按鈕」來觸發它

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 確保機器人有權限把檔案 push 回來

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas lxml requests

      - name: Run cache builder
        run: python build_cache.py

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add sp500_mapping.json
          git commit -m "Auto-generate S&P 500 cache" || echo "No changes to commit"
          git push
