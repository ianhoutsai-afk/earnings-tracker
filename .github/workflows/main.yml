name: Daily Earnings Update

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # 升級到 v4 解決警告

      - name: Set up Python
        uses: actions/setup-python@v5 # 升級到 v5 解決警告
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install yfinance requests

      - name: Run update script
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}  # 從保險箱拿出鑰匙
        run: python update_data.py

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update earnings data" && git push)
