name: Daily Earnings Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: # 添加这一行，开启手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install
          pip install yfinance requests

      - name: Run update script
        run: python update_data.py # 移除 env 設定

      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update earnings data" && git push)
